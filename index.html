<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backshot Cam - 自动后脑勺抓拍</title>
    <!-- 引入 TensorFlow.js 和 Face Detection 模型 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-detection@1.0.2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f43f5e;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* 视频容器 */
        #app-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #video-wrapper {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* 镜像翻转 */
        }

        canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transform: scaleX(-1);
        }

        /* 状态栏 */
        #status-pill {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 99px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #94a3b8;
        }
        .dot.active {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 角度指示器 */
        #yaw-meter {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            z-index: 10;
        }

        #yaw-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.1s ease-out;
        }

        /* 控制区 */
        #controls {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 30px;
            z-index: 20;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 15px;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn.primary {
            width: 80px;
            height: 80px;
            border: 4px solid var(--primary);
        }
        
        .btn.active {
            border-color: var(--accent);
            background: rgba(244, 63, 94, 0.2);
        }

        /* 抓拍预览 */
        #capture-preview {
            position: absolute;
            bottom: 140px;
            right: 20px;
            width: 80px;
            height: 100px;
            border-radius: 12px;
            border: 2px solid white;
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 30;
        }

        #capture-preview.show {
            transform: translateY(0);
            opacity: 1;
        }

        #capture-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 快门闪白 */
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .flash-anim {
            animation: flash-effect 0.4s ease-out;
        }

        @keyframes flash-effect {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 设置面板 */
        #settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 200;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        input[type=range] {
            width: 150px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div id="loading" class="loading-screen">
        <span class="loader"></span>
        <p style="margin-top: 20px; font-weight: 300;">正在模型初始化...</p>
    </div>

    <div id="app-container">
        <!-- 状态栏 -->
        <div id="status-pill">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">摄像头未就绪</span>
        </div>

        <!-- 视频预览 -->
        <div id="video-wrapper">
            <video id="video" playsinline muted autoplay></video>
            <canvas id="overlay"></canvas>
        </div>

        <!-- 角度表 -->
        <div id="yaw-meter">
            <div id="yaw-bar"></div>
        </div>

        <!-- 抓拍预览 -->
        <div id="capture-preview">
            <img id="preview-img" src="" alt="Snapshot">
        </div>

        <!-- 控制区 -->
        <div id="controls">
            <button class="btn" id="btn-settings" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.72V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.17a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="btn primary" id="btn-toggle" title="开启/关闭抓拍">
                <svg id="icon-camera" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            </button>
            <button class="btn" id="btn-save" title="分享/保存此图">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            </button>
        </div>
    </div>

    <!-- 设置浮层 -->
    <div id="settings-overlay">
        <h2 style="margin-bottom: 30px;">拍摄设置</h2>
        <div class="setting-item">
            <span>抓拍灵敏度 (偏离角)</span>
            <input type="range" id="param-threshold" min="40" max="85" value="65">
        </div>
        <div class="setting-item">
            <span>捕捉冷却 (秒)</span>
            <input type="range" id="param-cooldown" min="1" max="10" value="3">
        </div>
        <div class="setting-item">
            <span>显示调试关键点</span>
            <input type="checkbox" id="param-debug">
        </div>
        <button class="btn" id="btn-close-settings" style="width: 100%; border-radius: 12px; height: 50px; margin-top: auto;">关闭</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const overlayCtx = overlay.getContext('2d');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const yawBar = document.getElementById('yaw-bar');
        const flash = document.getElementById('flash');
        const previewImg = document.getElementById('preview-img');
        const previewContainer = document.getElementById('capture-preview');
        
        let detector;
        let isCapturing = false;
        let autoSnapEnabled = false;
        let lastSnapTime = 0;
        let threshold = 65; // Degrees
        let cooldown = 3000; // ms
        let currentYaw = 0;
        let capturedFile = null;

        // 初始化
        async function setup() {
            try {
                // 1. 获取摄像头
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 },
                    audio: false
                });
                video.srcObject = stream;
                await new Promise((resolve) => (video.onloadedmetadata = resolve));
                
                // 设置并同步 Canvas 尺寸
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;

                // 2. 加载模型
                const model = faceDetection.SupportedModels.MediaPipeFaceDetector;
                const detectorConfig = {
                    runtime: 'mediapipe',
                    solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection'
                };
                detector = await faceDetection.createDetector(model, detectorConfig);

                document.getElementById('loading').style.display = 'none';
                statusDot.classList.add('active');
                statusText.innerText = '等待指令...';
                
                detectLoop();
            } catch (err) {
                console.error(err);
                alert('摄像头或模型加载失败，请确保使用 HTTPS 环境并授权：' + err.message);
            }
        }

        // 核心检测循环
        async function detectLoop() {
            if (detector) {
                const faces = await detector.estimateFaces(video);
                
                overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
                
                if (faces.length > 0) {
                    processFace(faces[0]);
                } else {
                    currentYaw = 0;
                    updateYawMeter(0);
                    statusText.innerText = autoSnapEnabled ? '正在搜寻面部...' : '就绪';
                }
            }
            requestAnimationFrame(detectLoop);
        }

        function processFace(face) {
            const keypoints = face.keypoints;
            // Keypoints map: 0: R eye, 1: L eye, 2: Nose, 3: Mouth, 4: R ear, 5: L ear
            const eyeR = keypoints[0];
            const eyeL = keypoints[1];
            const nose = keypoints[2];

            // 计算偏航角估算值 (Yaw Score)
            // 镜像环境下：鼻尖相对于双眼中点的偏移量
            const midEyeX = (eyeR.x + eyeL.x) / 2;
            const eyeDist = Math.abs(eyeR.x - eyeL.x);
            
            // 归一化得分：当鼻子在眼睛中间时为0，靠向一边时增大
            // 修正：镜像/非镜像逻辑
            const rawScore = (nose.x - midEyeX) / eyeDist;
            
            // 粗略转换为角度 (基于经验公式: score ~ tan(theta))
            // 在 65 度时，score 约为 1.2 - 1.5
            let yawDeg = rawScore * 50; 
            currentYaw = Math.abs(yawDeg);

            updateYawMeter(currentYaw);

            // 绘制调试点
            if (document.getElementById('param-debug').checked) {
                overlayCtx.fillStyle = '#22c55e';
                keypoints.forEach(kp => {
                    overlayCtx.beginPath();
                    overlayCtx.arc(kp.x, kp.y, 4, 0, 2 * Math.PI);
                    overlayCtx.fill();
                });
            }

            // 逻辑检查：如果角度满足且开启了自动抓拍
            if (autoSnapEnabled && !isCapturing) {
                if (currentYaw > threshold && (Date.now() - lastSnapTime > cooldown)) {
                    triggerSnap();
                } else {
                    statusText.innerText = `检测中: ${Math.round(currentYaw)}°`;
                }
            }
        }

        function updateYawMeter(yaw) {
            const percent = Math.min((yaw / threshold) * 100, 100);
            yawBar.style.width = percent + '%';
            if (yaw > threshold) {
                yawBar.style.background = 'var(--accent)';
            } else {
                yawBar.style.background = 'linear-gradient(90deg, var(--primary), var(--accent))';
            }
        }

        async function triggerSnap() {
            isCapturing = true;
            lastSnapTime = Date.now();
            statusText.innerText = '抓拍中...';

            // 视觉反馈
            flash.classList.add('flash-anim');
            setTimeout(() => flash.classList.remove('flash-anim'), 400);

            // 离屏渲染抓拍
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            // 镜像翻转绘制，保持和预览一致
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            previewImg.src = dataUrl;
            previewContainer.classList.add('show');

            // 准备文件以便分享
            const blob = await (await fetch(dataUrl)).blob();
            capturedFile = new File([blob], `backshot_${Date.now()}.jpg`, { type: 'image/jpeg' });

            setTimeout(() => {
                isCapturing = false;
                statusText.innerText = '已抓拍，冷却中...';
            }, 1000);
        }

        // 事件监听
        document.getElementById('btn-toggle').addEventListener('click', () => {
            autoSnapEnabled = !autoSnapEnabled;
            const btn = document.getElementById('btn-toggle');
            if (autoSnapEnabled) {
                btn.classList.add('active');
                statusText.innerText = '自动抓拍开启';
                statusDot.style.background = '#f43f5e';
            } else {
                btn.classList.remove('active');
                statusText.innerText = '自动抓拍已关闭';
                statusDot.style.background = '#22c55e';
            }
        });

        document.getElementById('btn-save').addEventListener('click', async () => {
            if (!capturedFile) {
                alert('请先抓取一张照片');
                return;
            }

            if (navigator.share && navigator.canShare({ files: [capturedFile] })) {
                try {
                    await navigator.share({
                        files: [capturedFile],
                        title: '抓拍后脑勺',
                        text: '使用 Backshot Cam 自动抓拍'
                    });
                } catch (err) {
                    console.error('分享失败:', err);
                }
            } else {
                // 回退方案：长按图片保存或下载
                const link = document.createElement('a');
                link.href = previewImg.src;
                link.download = capturedFile.name;
                link.click();
                alert('您的浏览器不支持直接保存，已尝试触发下载或请长按预览图手动保存。');
            }
        });

        document.getElementById('btn-settings').addEventListener('click', () => {
            document.getElementById('settings-overlay').style.display = 'flex';
        });

        document.getElementById('btn-close-settings').addEventListener('click', () => {
            threshold = parseInt(document.getElementById('param-threshold').value);
            cooldown = parseInt(document.getElementById('param-cooldown').value) * 1000;
            document.getElementById('settings-overlay').style.display = 'none';
        });

        // 启动
        setup();
    </script>
</body>
</html>
